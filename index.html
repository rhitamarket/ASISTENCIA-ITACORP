<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multi-Empresa RRHH v12.0</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <style>
        :root { --verde: #28a745; --azul: #007bff; --rojo: #dc3545; --negro: #343a40; }
        body { font-family: sans-serif; background: #fff; height: 100vh; margin: 0; overflow: hidden; display: flex; flex-direction: column; }
        .main-wrapper { display: flex; flex: 1; height: 100vh; width: 100vw; position: relative; overflow: hidden; }

        #sidebar { 
            width: 320px; background: #f8f9fa; border-right: 1px solid #ddd; 
            display: flex; flex-direction: column; overflow-y: auto; padding: 15px; 
            flex-shrink: 0; z-index: 2000; transition: all 0.3s ease; 
        }

        #calendar-container { flex-grow: 1; position: relative; background: white; overflow: hidden; display: flex; flex-direction: column; }
        #calendar { flex-grow: 1; }

        @media (max-width: 768px) {
            #sidebar { position: absolute; left: 0; top: 0; height: 100%; transform: translateX(-100%); width: 280px; }
            #sidebar.active { transform: translateX(0); box-shadow: 5px 0 15px rgba(0,0,0,0.2); }
        }

        #btnToggleMenu { 
            position: fixed; bottom: 20px; left: 20px; z-index: 3000; 
            border-radius: 50%; width: 56px; height: 56px; font-size: 20px; 
            display: none; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        @media (max-width: 768px) { #btnToggleMenu { display: flex; } }

        .fc-event { 
            cursor: pointer; border: none !important; padding: 2px 8px !important; 
            border-radius: 4px !important; margin: 2px 0 !important;
            font-size: 0.75em; font-weight: 600; color: white !important;
            height: 24px; display: flex; align-items: center;
        }

        .sidebar-item { border-left: 5px solid #ccc; padding: 10px; background: white; margin-bottom: 8px; border-radius: 4px; cursor: pointer; border: 1px solid #ddd; font-size: 11px; }
        .cat-vacaciones { background-color: var(--verde) !important; }
        .cat-licencia { background-color: var(--azul) !important; }
        .cat-ausencia { background-color: var(--rojo) !important; }
        .cat-retiro { background-color: var(--negro) !important; }
        
        .badge-empresa { font-size: 0.7em; background: rgba(255,255,255,0.2); padding: 2px 4px; border-radius: 3px; margin-right: 5px; }
    </style>
</head>
<body>

<button id="btnToggleMenu" class="btn btn-primary" onclick="toggleSidebar()">☰</button>

<div class="main-wrapper">
    <div id="sidebar">
        <h5 class="mb-3">RRHH Multi-Empresa</h5>
        
        <div class="d-grid gap-2 mb-3">
            <button class="btn btn-success btn-sm" onclick="openCreateModal()">+ NUEVO REGISTRO</button>
            <div class="btn-group">
                <button class="btn btn-outline-dark btn-sm" onclick="exportToExcel()">Excel</button>
                <button class="btn btn-outline-secondary btn-sm" onclick="toggleFullScreenCalendar()">Full</button>
            </div>
        </div>

        <hr class="my-2">
        
        <!-- Nuevo Filtro de Empresa -->
        <label class="small fw-bold mb-1">Filtrar por Empresa:</label>
        <select id="companyFilter" class="form-select form-select-sm mb-3" onchange="refreshAll()">
            <option value="all">Todas las Empresas</option>
            <option value="ITA EIRL">Empresa A</option>
            <option value="ITA SpA">Empresa B</option>
            <option value="Kapgroup">Empresa C</option>
            <option value="Itahydraulic">Empresa D</option>
        </select>

        <input type="text" id="workerSearch" class="form-control form-control-sm mb-2" placeholder="🔍 Buscar trabajador..." onkeyup="refreshAll()">

        <div class="d-flex flex-wrap gap-1 mb-3">
            <button class="btn btn-light border btn-sm flex-fill py-0" onclick="setCatFilter('all')">Todos</button>
            <button class="btn btn-success btn-sm flex-fill py-0" onclick="setCatFilter('cat-vacaciones')">V/P</button>
            <button class="btn btn-primary btn-sm flex-fill py-0" onclick="setCatFilter('cat-licencia')">Lic</button>
            <button class="btn btn-danger btn-sm flex-fill py-0" onclick="setCatFilter('cat-ausencia')">Aus</button>
            <button class="btn btn-dark btn-sm flex-fill py-0" onclick="setCatFilter('cat-retiro')">Ret</button>
        </div>

        <div id="workerList" style="flex: 1; overflow-y: auto;"></div>
    </div>

    <div id="calendar-container">
        <div id="calendar"></div>
    </div>
</div>

<!-- Modal Actualizado -->
<div class="modal fade" id="eventModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Registro de Asistencia</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="attendanceForm">
                    <input type="hidden" id="editId">
                    
                    <div class="mb-2">
                        <label class="form-label small">Empresa</label>
                        <select id="workerCompany" class="form-select" required>
                            <option value="Empresa A">Empresa A</option>
                            <option value="Empresa B">Empresa B</option>
                            <option value="Empresa C">Empresa C</option>
                            <option value="Empresa D">Empresa D</option>
                        </select>
                    </div>

                    <div class="mb-2">
                        <label class="form-label small">Nombre Trabajador</label>
                        <input type="text" id="workerName" class="form-control" required>
                    </div>

                    <div class="mb-2">
                        <label class="form-label small">Tipo de Ausencia</label>
                        <select id="regType" class="form-select" onchange="handleTypeChange()">
                            <option value="cat-vacaciones">Vacaciones / Permiso</option>
                            <option value="cat-licencia">Licencia Médica</option>
                            <option value="cat-ausencia">Ausencia</option>
                            <option value="cat-retiro">Retiro Anticipado</option>
                        </select>
                    </div>
                    
                    <div id="divDistintivo" style="display:none;" class="mb-2">
                        <label class="form-label small">Subtipo</label>
                        <select id="vacDistintivo" class="form-select">
                            <option value="[V]">Vacaciones (V)</option>
                            <option value="[P]">Permiso Administrativo (P)</option>
                        </select>
                    </div>

                    <div id="divHoraRetiro" style="display:none;" class="mb-2">
                        <label class="form-label small">Hora de Salida</label>
                        <input type="time" id="exitTime" class="form-control">
                    </div>

                    <div class="row">
                        <div class="col-6 mb-2">
                            <label class="form-label small">Fecha Inicio</label>
                            <input type="date" id="startDate" class="form-control" required>
                        </div>
                        <div class="col-6 mb-2" id="divFechaFin">
                            <label class="form-label small">Fecha Fin</label>
                            <input type="date" id="endDate" class="form-control">
                        </div>
                    </div>
                    <div class="mb-2">
                        <label class="form-label small">Observaciones</label>
                        <textarea id="comments" class="form-control" rows="2"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-sm btn-danger d-none" id="btnDelete" onclick="deleteEvent()">Eliminar</button>
                <button type="button" class="btn btn-sm btn-primary" onclick="saveEvent()">Guardar</button>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAQeXVFJJ1e4HWVzSY7YcerP9_XXEKnOJo",
        authDomain: "calendario-asistencia.firebaseapp.com",
        databaseURL: "https://calendario-asistencia-default-rtdb.firebaseio.com",
        projectId: "calendario-asistencia",
        storageBucket: "calendario-asistencia.firebasestorage.app",
        messagingSenderId: "534554105950",
        appId: "1:534554105950:web:0f23d9661812309f11fccf"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('asistencias');
    let calendar, events = [], currentCatFilter = 'all';

    function formatToDMY(dateStr) {
        if(!dateStr) return '';
        const parts = dateStr.split('-');
        return `${parts[2]}-${parts[1]}-${parts[0]}`;
    }

    document.addEventListener('DOMContentLoaded', function() {
        calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
            initialView: 'dayGridMonth',
            locale: 'es',
            firstDay: 1,
            height: '100%',
            eventOrder: "title", 
            headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,listMonth' },
            eventClick: (info) => openEditModalById(info.event.id)
        });
        calendar.render();

        db.on('value', (snapshot) => {
            const data = snapshot.val();
            events = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })) : [];
            refreshAll();
        });
    });

    function setCatFilter(f) { currentCatFilter = f; refreshAll(); }

    function refreshAll() {
        if (!calendar) return;
        const search = (document.getElementById('workerSearch').value || "").toLowerCase();
        const companyF = document.getElementById('companyFilter').value;
        
        const filtered = events.filter(e => {
            const matchesSearch = (e.pureName || "").toLowerCase().includes(search);
            const matchesCat = (currentCatFilter === 'all' || e.rawType === currentCatFilter);
            const matchesCompany = (companyF === 'all' || e.company === companyF);
            return matchesSearch && matchesCat && matchesCompany;
        });

        const calendarEvents = filtered.map(e => {
            let endF = new Date((e.realEnd || e.start) + 'T00:00:00');
            endF.setDate(endF.getDate() + 1);

            return {
                id: e.id,
                title: `${e.company ? '['+e.company.split(' ')[1]+'] ' : ''}${e.pureName}${e.exitTime ? ' ('+e.exitTime+')' : ''}${e.distintivo ? ' ' + e.distintivo : ''}`,
                start: e.start,
                end: endF.toISOString().split('T')[0],
                allDay: true,
                className: [e.rawType],
                extendedProps: { ...e }
            };
        });

        calendar.removeAllEvents();
        calendar.addEventSource(calendarEvents);

        const list = document.getElementById('workerList');
        list.innerHTML = '';
        filtered.sort((a,b) => a.pureName.localeCompare(b.pureName)).forEach(ev => {
            list.innerHTML += `<div class="sidebar-item" onclick="openEditModalById('${ev.id}')">
                <span class="badge bg-secondary mb-1" style="font-size:0.8em">${ev.company || 'Sin Empresa'}</span><br>
                <strong>${ev.pureName}</strong><br>
                <small>${formatToDMY(ev.start)} al ${formatToDMY(ev.realEnd || ev.start)}</small></div>`;
        });
    }

    function openEditModalById(id) {
        const original = events.find(e => e.id === id);
        if (!original) return;
        forceCloseSidebar();
        document.getElementById('editId').value = original.id;
        document.getElementById('workerCompany').value = original.company || 'Empresa A';
        document.getElementById('workerName').value = original.pureName || '';
        document.getElementById('regType').value = original.rawType || 'cat-vacaciones';
        document.getElementById('startDate').value = original.start;
        document.getElementById('endDate').value = original.realEnd || original.start;
        document.getElementById('comments').value = original.comment || '';
        document.getElementById('exitTime').value = original.exitTime || '';
        if (original.distintivo) document.getElementById('vacDistintivo').value = original.distintivo;
        
        document.getElementById('btnDelete').classList.remove('d-none');
        document.getElementById('modalTitle').innerText = "Editar Registro";
        handleTypeChange();
        new bootstrap.Modal(document.getElementById('eventModal')).show();
    }

    function handleTypeChange() {
        const type = document.getElementById('regType').value;
        document.getElementById('divDistintivo').style.display = (type === 'cat-vacaciones') ? 'block' : 'none';
        document.getElementById('divHoraRetiro').style.display = (type === 'cat-retiro') ? 'block' : 'none';
        document.getElementById('divFechaFin').style.display = (type === 'cat-retiro') ? 'none' : 'block';
    }

    function openCreateModal() {
        forceCloseSidebar();
        document.getElementById('attendanceForm').reset();
        document.getElementById('editId').value = '';
        document.getElementById('btnDelete').classList.add('d-none');
        document.getElementById('modalTitle').innerText = "Nuevo Registro";
        handleTypeChange();
        new bootstrap.Modal(document.getElementById('eventModal')).show();
    }

    function saveEvent() {
        const id = document.getElementById('editId').value;
        const type = document.getElementById('regType').value;
        const data = {
            company: document.getElementById('workerCompany').value,
            pureName: document.getElementById('workerName').value,
            start: document.getElementById('startDate').value,
            realEnd: (type === 'cat-retiro') ? document.getElementById('startDate').value : (document.getElementById('endDate').value || document.getElementById('startDate').value),
            rawType: type,
            exitTime: (type === 'cat-retiro') ? document.getElementById('exitTime').value : '',
            distintivo: (type === 'cat-vacaciones') ? document.getElementById('vacDistintivo').value : '',
            comment: document.getElementById('comments').value
        };
        if (id) db.child(id).update(data); else db.push(data);
        bootstrap.Modal.getInstance(document.getElementById('eventModal')).hide();
    }

    function deleteEvent() {
        if(confirm("¿Eliminar definitivamente?")) {
            db.child(document.getElementById('editId').value).remove();
            bootstrap.Modal.getInstance(document.getElementById('eventModal')).hide();
        }
    }

    function exportToExcel() {
        const companyF = document.getElementById('companyFilter').value;
        const data = events
            .filter(e => companyF === 'all' || e.company === companyF)
            .map(e => ({ 
                Empresa: e.company,
                Trabajador: e.pureName, 
                Tipo: e.rawType, 
                Inicio: formatToDMY(e.start), 
                Fin: formatToDMY(e.realEnd),
                Nota: e.comment 
            }));
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Asistencia");
        XLSX.writeFile(wb, `Reporte_RRHH_${companyF}.xlsx`);
    }

    function toggleFullScreenCalendar() {
        const container = document.getElementById('calendar-container');
        if (!document.fullscreenElement) {
            if (container.requestFullscreen) container.requestFullscreen();
            else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
        } else {
            document.exitFullscreen();
        }
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
    function forceCloseSidebar() { if(window.innerWidth < 768) document.getElementById('sidebar').classList.remove('active'); }
</script>
</body>
</html>
