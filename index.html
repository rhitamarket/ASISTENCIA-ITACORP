<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asistencia RRHH Online</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <style>
        :root { --verde: #28a745; --azul: #007bff; --rojo: #dc3545; --negro: #343a40; }
        body { font-family: sans-serif; background: #f4f7f6; height: 100vh; margin: 0; overflow: hidden; }
        .main-wrapper { display: flex; height: 100vh; width: 100vw; position: relative; }
        #sidebar { width: 300px; background: white; border-right: 1px solid #ddd; overflow-y: auto; padding: 15px; flex-shrink: 0; z-index: 100; transition: 0.3s; }
        #calendar-container { flex-grow: 1; background: white; padding: 5px; height: 100vh; overflow: hidden; }
        @media (max-width: 768px) {
            #sidebar { position: absolute; left: -100%; width: 280px; height: 100%; box-shadow: 2px 0 10px rgba(0,0,0,0.2); }
            #sidebar.active { left: 0; }
        }
        #btnToggleMenu { position: fixed; bottom: 20px; left: 20px; z-index: 1000; border-radius: 50%; width: 55px; height: 55px; display: none; }
        @media (max-width: 768px) { #btnToggleMenu { display: block; } }
        .hidden { display: none; }
        .sidebar-item { border-left: 5px solid #ccc; padding: 10px; background: #f8f9fa; margin-bottom: 8px; border-radius: 4px; cursor: pointer; font-size: 0.9em; }
        .fc-event { cursor: pointer; border: none !important; }
        .cat-vacaciones { background-color: var(--verde) !important; }
        .cat-licencia { background-color: var(--azul) !important; }
        .cat-ausencia { background-color: var(--rojo) !important; }
        .cat-retiro { background-color: var(--negro) !important; }
    </style>
</head>
<body>

<button id="btnToggleMenu" class="btn btn-primary shadow" onclick="toggleSidebar()">☰</button>

<div class="main-wrapper">
    <div id="sidebar">
        <h4>Panel RRHH</h4>
        <div class="d-grid gap-2 mb-3">
            <button class="btn btn-primary" onclick="openCreateModal()">+ NUEVO REGISTRO</button>
            <button class="btn btn-outline-success btn-sm" onclick="exportToExcel()">Exportar Excel</button>
        </div>
        <input type="text" id="workerSearch" class="form-control mb-3" placeholder="Buscar trabajador..." onkeyup="refreshAll()">
        <div id="workerList"></div>
    </div>

    <div id="calendar-container">
        <div id="calendar"></div>
    </div>
</div>

<div class="modal fade" id="eventModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Registro de Asistencia</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="attendanceForm">
                    <input type="hidden" id="editId">
                    <div class="mb-3">
                        <label class="form-label">Nombre Trabajador</label>
                        <input type="text" id="workerName" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Tipo</label>
                        <select id="regType" class="form-select" onchange="handleTypeChange()">
                            <option value="cat-vacaciones">Vacaciones / Permiso</option>
                            <option value="cat-licencia">Licencia Médica</option>
                            <option value="cat-ausencia">Ausencia</option>
                            <option value="cat-retiro">Retiro Anticipado</option>
                        </select>
                    </div>
                    <div id="divDistintivo" class="mb-3 hidden">
                        <select id="vacDistintivo" class="form-select">
                            <option value="[V]">Vacaciones (V)</option>
                            <option value="[P]">Permiso (P)</option>
                        </select>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">Desde</label>
                            <input type="date" id="startDate" class="form-control" required>
                        </div>
                        <div class="col-6 mb-3" id="colHasta">
                            <label class="form-label">Hasta</label>
                            <input type="date" id="endDate" class="form-control">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Comentarios</label>
                        <textarea id="comments" class="form-control" rows="2"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-danger d-none" id="btnDelete" onclick="deleteEvent()">Eliminar</button>
                <button type="button" class="btn btn-primary" onclick="saveEvent()">Guardar Datos</button>
            </div>
        </div>
    </div>
</div>

<script>
    // CONFIGURACIÓN FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyAQeXVFJJ1e4HWVzSY7YcerP9_XXEKnOJo",
        authDomain: "calendario-asistencia.firebaseapp.com",
        databaseURL: "https://calendario-asistencia-default-rtdb.firebaseio.com",
        projectId: "calendario-asistencia",
        storageBucket: "calendario-asistencia.firebasestorage.app",
        messagingSenderId: "534554105950",
        appId: "1:534554105950:web:0f23d9661812309f11fccf"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('asistencias');

    let calendar;
    let events = [];

    document.addEventListener('DOMContentLoaded', function() {
        // Inicializar Calendario
        const calendarEl = document.getElementById('calendar');
        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: window.innerWidth < 768 ? 'listMonth' : 'dayGridMonth',
            locale: 'es',
            height: '100%',
            headerToolbar: { left: 'prev,next', center: 'title', right: 'today' },
            eventClick: (info) => openEditModal(info.event)
        });
        calendar.render();

        // Cargar Datos
        db.on('value', (snapshot) => {
            const data = snapshot.val();
            events = [];
            if (data) Object.keys(data).forEach(key => events.push({ id: key, ...data[key] }));
            refreshAll();
        });
    });

    function openCreateModal() {
        const modalEl = document.getElementById('eventModal');
        const instanciaModal = bootstrap.Modal.getOrCreateInstance(modalEl);
        document.getElementById('attendanceForm').reset();
        document.getElementById('editId').value = '';
        document.getElementById('btnDelete').classList.add('d-none');
        handleTypeChange();
        instanciaModal.show();
    }

    function saveEvent() {
        const id = document.getElementById('editId').value;
        const worker = document.getElementById('workerName').value;
        const start = document.getElementById('startDate').value;
        const type = document.getElementById('regType').value;
        let end = document.getElementById('endDate').value || start;

        if (!worker || !start) return alert("Nombre y Fecha son obligatorios");

        const payload = {
            title: worker + (type === 'cat-vacaciones' ? ' ' + document.getElementById('vacDistintivo').value : ''),
            start: start,
            end: end,
            pureName: worker,
            rawType: type,
            comment: document.getElementById('comments').value,
            className: [type]
        };

        if (id) db.child(id).update(payload);
        else db.push(payload);

        bootstrap.Modal.getInstance(document.getElementById('eventModal')).hide();
    }

    function refreshAll() {
        calendar.removeAllEvents();
        calendar.addEventSource(events);
        
        const list = document.getElementById('workerList');
        list.innerHTML = '';
        events.forEach(ev => {
            list.innerHTML += `<div class="sidebar-item" onclick="openEditById('${ev.id}')">
                <strong>${ev.pureName}</strong><br><small>${ev.start}</small>
            </div>`;
        });
    }

    function openEditModal(event) {
        const modalEl = document.getElementById('eventModal');
        const instanciaModal = bootstrap.Modal.getOrCreateInstance(modalEl);
        
        document.getElementById('editId').value = event.id;
        document.getElementById('workerName').value = event.extendedProps.pureName;
        document.getElementById('startDate').value = event.startStr;
        document.getElementById('regType').value = event.extendedProps.rawType;
        document.getElementById('btnDelete').classList.remove('d-none');
        
        instanciaModal.show();
    }

    function openEditById(id) {
        const ev = calendar.getEventById(id);
        if(ev) openEditModal(ev);
    }

    function deleteEvent() {
        const id = document.getElementById('editId').value;
        if(confirm("¿Eliminar registro?") && id) {
            db.child(id).remove();
            bootstrap.Modal.getInstance(document.getElementById('eventModal')).hide();
        }
    }

    function handleTypeChange() {
        const type = document.getElementById('regType').value;
        document.getElementById('divDistintivo').classList.toggle('hidden', type !== 'cat-vacaciones');
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
    }
</script>
</body>
</html>
